<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chargedGradient" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feFlood flood-color="#3B82F6" flood-opacity="0.3" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0B0F1A"/>

  <!-- The AI Forge V Symbol -->
  <g filter="url(#softGlow)">
    <!-- Main V body -->
    <path d="M164 168C164 168 200 320 256 395C312 320 376 220 376 220" stroke="url(#chargedGradient)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Node Branches -->
    <path d="M336 265C356 240 384 180 410 145" stroke="url(#chargedGradient)" stroke-width="12" stroke-linecap="round"/>
    <path d="M346 250C366 230 400 210 430 190" stroke="url(#chargedGradient)" stroke-width="12" stroke-linecap="round"/>
    <path d="M356 235C376 225 410 235 430 255" stroke="url(#chargedGradient)" stroke-width="12" stroke-linecap="round"/>

    <!-- Nodes (Circles) -->
    <circle cx="410" cy="145" r="16" fill="#D8B4FE"/>
    <circle cx="430" cy="190" r="12" fill="#3B82F6"/>
    <circle cx="430" cy="255" r="10" fill="#22D3EE"/>
    
    <!-- Spark on the top node -->
    <circle cx="410" cy="145" r="6" fill="#FFFFFF"/>
  </g>
</svg>
