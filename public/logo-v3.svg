<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forge_gradient" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="forge_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feFlood flood-color="#3B82F6" flood-opacity="0.3" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0B0F1A"/>

  <!-- The Forge Pulsar Symbol (Radial Symmetry like ChatGPT) -->
  <g filter="url(#forge_glow)" transform="translate(256, 256)">
    <!-- 6 Rotating Vanes -->
    <g transform="rotate(0)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>
    <g transform="rotate(60)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>
    <g transform="rotate(120)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>
    <g transform="rotate(180)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>
    <g transform="rotate(240)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>
    <g transform="rotate(300)">
      <rect x="-24" y="-140" width="48" height="120" rx="24" fill="url(#forge_gradient)" opacity="0.9"/>
    </g>

    <!-- Central Node -->
    <circle cx="0" cy="0" r="40" fill="#0B0F1A"/>
    <circle cx="0" cy="0" r="32" fill="url(#forge_gradient)"/>
    <circle cx="0" cy="0" r="12" fill="#FFFFFF">
      <animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
