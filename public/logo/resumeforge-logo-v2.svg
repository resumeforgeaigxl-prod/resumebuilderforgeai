<svg width="280" height="60" viewBox="0 0 280 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="logo_grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C026D3" /> <!-- fuchsia-600 -->
      <stop offset="50%" stop-color="#7C3AED" /> <!-- violet-600 -->
      <stop offset="100%" stop-color="#2563EB" /> <!-- blue-600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Neural V Icon -->
  <g transform="translate(5, 5) scale(0.9)">
    <!-- Main V Ribbon -->
    <path d="M5 10 L20 45 L35 15" stroke="url(#logo_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M20 45 L45 5" stroke="url(#logo_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Neural Branches -->
    <g stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)">
      <path d="M38 12 C42 8, 45 10, 50 5" />
      <path d="M40 18 C45 15, 48 20, 55 18" />
      <path d="M42 24 C48 22, 52 28, 58 25" />
    </g>
    
    <!-- Neural Nodes -->
    <circle cx="50" cy="5" r="3" fill="#A855F7" />
    <circle cx="55" cy="18" r="3" fill="#6366F1" />
    <circle cx="58" cy="25" r="3" fill="#3B82F6" />
    
    <!-- Sparkle on top node -->
    <path d="M50 0 L50 10 M45 5 L55 5" stroke="white" stroke-width="0.5" opacity="0.8" />
  </g>

  <!-- Text: ResumeForgeAI -->
  <text x="70" y="38" fill="white" style="font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; letter-spacing: -0.5px;">
    ResumeForge<tspan fill="#818CF8">AI</tspan>
  </text>
</svg>
