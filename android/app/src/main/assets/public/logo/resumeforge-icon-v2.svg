<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon_grad" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C026D3" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="icon_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(5, 5)">
    <!-- Main V Ribbon -->
    <path d="M5 12 L20 45 L35 15" stroke="url(#icon_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M20 45 L45 5" stroke="url(#icon_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Neural Branches -->
    <g stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#icon_glow)">
      <path d="M38 12 C42 8, 45 10, 50 5" />
      <path d="M40 18 C45 15, 48 20, 55 18" />
      <path d="M42 24 C48 22, 52 28, 58 25" />
    </g>
    
    <!-- Neural Nodes -->
    <circle cx="50" cy="5" r="3" fill="#A855F7" />
    <circle cx="55" cy="18" r="3" fill="#6366F1" />
    <circle cx="58" cy="25" r="3" fill="#3B82F6" />
  </g>
</svg>
